name: Deploy to GitHub Pages

# Runs on every push to main (and can be triggered by hand from the Actions
# tab). It builds the static site and publishes dist/ to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs. Minimal by design.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at the same time; let an in-flight one finish.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs the Zod validation on site.json, so a malformed
      # content edit fails here (the live site stays untouched) instead of
      # publishing a broken page.
      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
